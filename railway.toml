[build]
builder = "nixpacks"
buildCommand = "./node_modules/.bin/prisma generate && npm run build"

[deploy]
# 1. Apply any pending migrations.
# 2. Run seed — admin user always rotated to current env vars, products only
#    inserted on a truly empty DB. Failure is non-fatal so web still boots.
# 3. Start Next.js.
# Direct binary paths skip npx package resolution overhead on each cold start.
startCommand = "./node_modules/.bin/prisma migrate deploy && (npm run db:seed || echo '[warn] seed step failed, continuing boot') && node node_modules/next/dist/bin/next start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ─── Persistent storage for admin uploads ───────────────────────────────
# Required for the self-hosted upload system to survive deploys.
# Set up via Railway UI:
#   1. Service → Settings → Volumes → New Volume
#   2. Mount path: /data
#   3. Size: 5GB (cheap, grows on demand)
# Then add env var: UPLOAD_DIR=/data/uploads
# Without a volume, uploaded files live in the ephemeral container filesystem
# and disappear on the next deploy.
